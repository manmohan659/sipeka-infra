# Frontend container runs as non-root, so listen on high ports; host maps 80->8080, 443->8443
server {
    listen 8080;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 8443 ssl;
    server_name _;

    ssl_certificate /etc/nginx/ssl/live/YOURDOMAIN/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/YOURDOMAIN/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://backend:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://backend:5000/health;
    }

    location /images/ {
        proxy_pass http://backend:5000/images/;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
