name: Nightly QA Build

on:
  schedule:
    - cron: '0 2 * * *'  # 2 AM UTC every night
  repository_dispatch:
    types: [deploy-qa]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag to deploy'
        required: false
        default: 'latest'

env:
  AWS_REGION: us-west-2
  ECR_BACKEND: sipeka-backend
  ECR_FRONTEND: sipeka-frontend

jobs:
  rebuild-images:
    name: Rebuild Docker Images
    if: github.event_name != 'repository_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger build-push workflow in app repo
        env:
          GH_TOKEN: ${{ secrets.INFRA_REPO_PAT }}
        run: |
          gh workflow run build-push.yml \
            --repo manmohan659/sipeka \
            --ref main \
            -f skip_infra_trigger=true

      - name: Wait for build to complete
        env:
          GH_TOKEN: ${{ secrets.INFRA_REPO_PAT }}
        timeout-minutes: 20
        run: |
          sleep 15

          RUN_ID=""
          for attempt in $(seq 1 24); do
            RUN_ID=$(gh run list \
              --repo manmohan659/sipeka \
              --workflow build-push.yml \
              --event workflow_dispatch \
              --limit 1 \
              --json databaseId,status \
              --jq 'map(select(.status == "queued" or .status == "in_progress")) | .[0].databaseId')

            if [ -n "$RUN_ID" ] && [ "$RUN_ID" != "null" ]; then
              break
            fi
            echo "Waiting for workflow run to appear (attempt $attempt/24)..."
            sleep 5
          done

          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "::error::Timed out waiting for build-push.yml run to appear"
            exit 1
          fi

          echo "Watching workflow run $RUN_ID..."
          gh run watch "$RUN_ID" --repo manmohan659/sipeka --exit-status

  verify-on-temp-ec2:
    name: Spin Up Temp EC2 & Smoke Test
    needs: [rebuild-images]
    if: >-
      always() &&
      (needs.rebuild-images.result == 'success' || needs.rebuild-images.result == 'skipped')
    runs-on: ubuntu-latest
    outputs:
      instance_id: ${{ steps.launch.outputs.instance_id }}
      test_passed: ${{ steps.smoke.outputs.passed }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "IMAGE_TAG=${{ github.event.client_payload.image_tag }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "IMAGE_TAG=${{ github.event.inputs.image_tag }}" >> $GITHUB_OUTPUT
          else
            echo "IMAGE_TAG=latest" >> $GITHUB_OUTPUT
          fi

      - name: Launch temporary EC2
        id: launch
        run: |
          INSTANCE_ID=$(aws ec2 run-instances \
            --image-id ami-0ba80f8099420ac44 \
            --instance-type t3.micro \
            --key-name manmohan \
            --security-group-ids ${{ secrets.SG_ID }} \
            --subnet-id ${{ secrets.SUBNET_ID }} \
            --tag-specifications 'ResourceType=instance,Tags=[{Key=Name,Value=sipeka-nightly-test},{Key=Environment,Value=nightly}]' \
            --iam-instance-profile Name=sipeka-ec2-profile \
            --user-data file://scripts/ec2-userdata.sh \
            --query 'Instances[0].InstanceId' \
            --output text)
          echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT
          echo "Launched temp EC2: $INSTANCE_ID"

      - name: Wait for EC2 to be ready
        run: |
          aws ec2 wait instance-running --instance-ids ${{ steps.launch.outputs.instance_id }}
          sleep 180
          TEMP_IP=$(aws ec2 describe-instances \
            --instance-ids ${{ steps.launch.outputs.instance_id }} \
            --query 'Reservations[0].Instances[0].PublicIpAddress' \
            --output text)
          echo "TEMP_IP=$TEMP_IP" >> $GITHUB_ENV

      - name: Deploy to temp EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ env.TEMP_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Wait for userdata to finish installing Docker + AWS CLI
            for i in $(seq 1 12); do
              if command -v docker &>/dev/null && command -v aws &>/dev/null; then
                echo "Docker and AWS CLI ready"
                break
              fi
              echo "Waiting for userdata to finish... attempt $i/12"
              sleep 10
            done

            sudo chmod 666 /var/run/docker.sock

            # Login to ECR
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com

            # Pull images
            docker pull ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_BACKEND }}:${{ steps.tag.outputs.IMAGE_TAG }}
            docker pull ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_FRONTEND }}:${{ steps.tag.outputs.IMAGE_TAG }}

            # Fetch DB credentials from SSM
            export DB_HOST=$(aws ssm get-parameter --name /sipeka/db/host --query 'Parameter.Value' --output text --region ${{ env.AWS_REGION }})
            export DB_USER=$(aws ssm get-parameter --name /sipeka/db/user --query 'Parameter.Value' --output text --region ${{ env.AWS_REGION }})
            export DB_PASSWORD=$(aws ssm get-parameter --name /sipeka/db/password --with-decryption --query 'Parameter.Value' --output text --region ${{ env.AWS_REGION }})
            export SESS_SECRET=$(aws ssm get-parameter --name /sipeka/sess/secret --with-decryption --query 'Parameter.Value' --output text --region ${{ env.AWS_REGION }})

            # Run containers
            docker network create sipeka-net 2>/dev/null || true

            docker run -d --name backend --network sipeka-net \
              -e DB_HOST=$DB_HOST -e DB_USER=$DB_USER -e DB_PASSWORD=$DB_PASSWORD \
              -e DB_NAME=db_penggajian3 -e SESS_SECRET=$SESS_SECRET \
              -e APP_PORT=5000 -e NODE_ENV=production -e CORS_ORIGIN=* \
              -p 5000:5000 \
              ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_BACKEND }}:${{ steps.tag.outputs.IMAGE_TAG }}

            docker run -d --name frontend --network sipeka-net \
              -p 80:8080 \
              ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_FRONTEND }}:${{ steps.tag.outputs.IMAGE_TAG }}

      - name: Run smoke tests
        id: smoke
        run: |
          sleep 30
          chmod +x scripts/smoke-test.sh
          if ./scripts/smoke-test.sh ${{ env.TEMP_IP }}; then
            echo "passed=true" >> $GITHUB_OUTPUT
          else
            echo "passed=false" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Terminate temp EC2
        if: always()
        run: |
          aws ec2 terminate-instances --instance-ids ${{ steps.launch.outputs.instance_id }}
          echo "Temp EC2 terminated"

  deploy-to-qa:
    name: Deploy to QA EC2
    runs-on: ubuntu-latest
    needs: verify-on-temp-ec2
    if: always() && needs.verify-on-temp-ec2.outputs.test_passed == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "IMAGE_TAG=${{ github.event.client_payload.image_tag }}" >> $GITHUB_OUTPUT
          else
            echo "IMAGE_TAG=latest" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to QA EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.QA_EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Login to ECR
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com

            # Stop existing containers
            docker stop frontend backend 2>/dev/null || true
            docker rm frontend backend 2>/dev/null || true

            # Pull latest images
            docker pull ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_BACKEND }}:${{ steps.tag.outputs.IMAGE_TAG }}
            docker pull ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_FRONTEND }}:${{ steps.tag.outputs.IMAGE_TAG }}

            # Fetch secrets from SSM
            export DB_HOST=$(aws ssm get-parameter --name /sipeka/db/host --query 'Parameter.Value' --output text --region ${{ env.AWS_REGION }})
            export DB_USER=$(aws ssm get-parameter --name /sipeka/db/user --query 'Parameter.Value' --output text --region ${{ env.AWS_REGION }})
            export DB_PASSWORD=$(aws ssm get-parameter --name /sipeka/db/password --with-decryption --query 'Parameter.Value' --output text --region ${{ env.AWS_REGION }})
            export SESS_SECRET=$(aws ssm get-parameter --name /sipeka/sess/secret --with-decryption --query 'Parameter.Value' --output text --region ${{ env.AWS_REGION }})

            # Run containers
            docker network create sipeka-net 2>/dev/null || true

            docker run -d --name backend --network sipeka-net --restart unless-stopped \
              -e DB_HOST=$DB_HOST -e DB_USER=$DB_USER -e DB_PASSWORD=$DB_PASSWORD \
              -e DB_NAME=db_penggajian3 -e SESS_SECRET=$SESS_SECRET \
              -e APP_PORT=5000 -e NODE_ENV=production -e CORS_ORIGIN=* \
              -p 5000:5000 \
              ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_BACKEND }}:${{ steps.tag.outputs.IMAGE_TAG }}

            docker run -d --name frontend --network sipeka-net --restart unless-stopped \
              -p 80:8080 -p 443:8443 \
              -v /etc/letsencrypt:/etc/nginx/ssl:ro \
              -v /home/ubuntu/nginx-ssl.conf:/etc/nginx/conf.d/default.conf:ro \
              ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_FRONTEND }}:${{ steps.tag.outputs.IMAGE_TAG }}

      - name: Verify QA deployment
        run: |
          sleep 15
          curl -sf http://${{ secrets.QA_EC2_HOST }}/health || echo "Health check will work after DNS propagation"

  trigger-rc:
    name: Trigger RC Promotion
    runs-on: ubuntu-latest
    needs: deploy-to-qa
    if: always() && needs.deploy-to-qa.result == 'success' && github.event_name == 'repository_dispatch'
    permissions:
      actions: write
    steps:
      - name: Check for release tag on source repo
        id: check-release
        run: |
          RELEASE_TAG=$(curl -sf \
            "https://api.github.com/repos/manmohan659/sipeka/releases/latest" \
            | jq -r '.tag_name')

          if [ -n "$RELEASE_TAG" ] && [ "$RELEASE_TAG" != "null" ]; then
            echo "Found release: $RELEASE_TAG"
            echo "has_release=true" >> $GITHUB_OUTPUT
            echo "rc_tag=$RELEASE_TAG" >> $GITHUB_OUTPUT
          else
            echo "No release found, skipping RC promotion"
            echo "has_release=false" >> $GITHUB_OUTPUT
          fi

      - name: Trigger RC deployment workflow
        if: steps.check-release.outputs.has_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run rc-deploy.yml \
            --ref main \
            -f rc_tag=${{ steps.check-release.outputs.rc_tag }} \
            -f source_tag=${{ github.event.client_payload.image_tag }}
          echo "Triggered rc-deploy.yml: rc_tag=${{ steps.check-release.outputs.rc_tag }}, source_tag=${{ github.event.client_payload.image_tag }}"
