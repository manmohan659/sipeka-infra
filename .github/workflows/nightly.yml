name: Nightly QA Build

on:
  schedule:
    - cron: '0 2 * * *'  # 2 AM UTC every night
  repository_dispatch:
    types: [deploy-qa]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag to deploy'
        required: false
        default: 'latest'

env:
  AWS_REGION: us-west-2
  ECR_BACKEND: sipeka-backend
  ECR_FRONTEND: sipeka-frontend

jobs:
  verify-on-temp-ec2:
    name: Spin Up Temp EC2 & Smoke Test
    runs-on: ubuntu-latest
    outputs:
      instance_id: ${{ steps.launch.outputs.instance_id }}
      test_passed: ${{ steps.smoke.outputs.passed }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "IMAGE_TAG=${{ github.event.client_payload.image_tag }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "IMAGE_TAG=${{ github.event.inputs.image_tag }}" >> $GITHUB_OUTPUT
          else
            echo "IMAGE_TAG=latest" >> $GITHUB_OUTPUT
          fi

      - name: Launch temporary EC2
        id: launch
        run: |
          INSTANCE_ID=$(aws ec2 run-instances \
            --image-id ami-0c55b159cbfafe1f0 \
            --instance-type t3.micro \
            --key-name manmohan \
            --security-group-ids ${{ secrets.SG_ID }} \
            --subnet-id ${{ secrets.SUBNET_ID }} \
            --tag-specifications 'ResourceType=instance,Tags=[{Key=Name,Value=sipeka-nightly-test},{Key=Environment,Value=nightly}]' \
            --user-data file://scripts/ec2-userdata.sh \
            --query 'Instances[0].InstanceId' \
            --output text)
          echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT
          echo "Launched temp EC2: $INSTANCE_ID"

      - name: Wait for EC2 to be ready
        run: |
          aws ec2 wait instance-running --instance-ids ${{ steps.launch.outputs.instance_id }}
          sleep 60
          TEMP_IP=$(aws ec2 describe-instances \
            --instance-ids ${{ steps.launch.outputs.instance_id }} \
            --query 'Reservations[0].Instances[0].PublicIpAddress' \
            --output text)
          echo "TEMP_IP=$TEMP_IP" >> $GITHUB_ENV

      - name: Deploy to temp EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ env.TEMP_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Login to ECR
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com

            # Pull images
            docker pull ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_BACKEND }}:${{ steps.tag.outputs.IMAGE_TAG }}
            docker pull ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_FRONTEND }}:${{ steps.tag.outputs.IMAGE_TAG }}

            # Fetch DB credentials from SSM
            export DB_HOST=$(aws ssm get-parameter --name /sipeka/db/host --query 'Parameter.Value' --output text --region ${{ env.AWS_REGION }})
            export DB_USER=$(aws ssm get-parameter --name /sipeka/db/user --query 'Parameter.Value' --output text --region ${{ env.AWS_REGION }})
            export DB_PASSWORD=$(aws ssm get-parameter --name /sipeka/db/password --with-decryption --query 'Parameter.Value' --output text --region ${{ env.AWS_REGION }})
            export SESS_SECRET=$(aws ssm get-parameter --name /sipeka/sess/secret --with-decryption --query 'Parameter.Value' --output text --region ${{ env.AWS_REGION }})

            # Run containers
            docker network create sipeka-net 2>/dev/null || true

            docker run -d --name backend --network sipeka-net \
              -e DB_HOST=$DB_HOST -e DB_USER=$DB_USER -e DB_PASSWORD=$DB_PASSWORD \
              -e DB_NAME=db_penggajian3 -e SESS_SECRET=$SESS_SECRET \
              -e APP_PORT=5000 -e NODE_ENV=production -e CORS_ORIGIN=* \
              -p 5000:5000 \
              ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_BACKEND }}:${{ steps.tag.outputs.IMAGE_TAG }}

            docker run -d --name frontend --network sipeka-net \
              -p 80:80 \
              ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_FRONTEND }}:${{ steps.tag.outputs.IMAGE_TAG }}

      - name: Run smoke tests
        id: smoke
        run: |
          sleep 30
          chmod +x scripts/smoke-test.sh
          if ./scripts/smoke-test.sh ${{ env.TEMP_IP }}; then
            echo "passed=true" >> $GITHUB_OUTPUT
          else
            echo "passed=false" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Terminate temp EC2
        if: always()
        run: |
          aws ec2 terminate-instances --instance-ids ${{ steps.launch.outputs.instance_id }}
          echo "Temp EC2 terminated"

  deploy-to-qa:
    name: Deploy to QA EC2
    runs-on: ubuntu-latest
    needs: verify-on-temp-ec2
    if: needs.verify-on-temp-ec2.outputs.test_passed == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "IMAGE_TAG=${{ github.event.client_payload.image_tag }}" >> $GITHUB_OUTPUT
          else
            echo "IMAGE_TAG=latest" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to QA EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.QA_EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Login to ECR
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com

            # Stop existing containers
            docker stop frontend backend 2>/dev/null || true
            docker rm frontend backend 2>/dev/null || true

            # Pull latest images
            docker pull ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_BACKEND }}:${{ steps.tag.outputs.IMAGE_TAG }}
            docker pull ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_FRONTEND }}:${{ steps.tag.outputs.IMAGE_TAG }}

            # Fetch secrets from SSM
            export DB_HOST=$(aws ssm get-parameter --name /sipeka/db/host --query 'Parameter.Value' --output text --region ${{ env.AWS_REGION }})
            export DB_USER=$(aws ssm get-parameter --name /sipeka/db/user --query 'Parameter.Value' --output text --region ${{ env.AWS_REGION }})
            export DB_PASSWORD=$(aws ssm get-parameter --name /sipeka/db/password --with-decryption --query 'Parameter.Value' --output text --region ${{ env.AWS_REGION }})
            export SESS_SECRET=$(aws ssm get-parameter --name /sipeka/sess/secret --with-decryption --query 'Parameter.Value' --output text --region ${{ env.AWS_REGION }})

            # Run containers
            docker network create sipeka-net 2>/dev/null || true

            docker run -d --name backend --network sipeka-net --restart unless-stopped \
              -e DB_HOST=$DB_HOST -e DB_USER=$DB_USER -e DB_PASSWORD=$DB_PASSWORD \
              -e DB_NAME=db_penggajian3 -e SESS_SECRET=$SESS_SECRET \
              -e APP_PORT=5000 -e NODE_ENV=production -e CORS_ORIGIN=* \
              -p 5000:5000 \
              ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_BACKEND }}:${{ steps.tag.outputs.IMAGE_TAG }}

            docker run -d --name frontend --network sipeka-net --restart unless-stopped \
              -p 80:80 -p 443:443 \
              -v /etc/letsencrypt:/etc/nginx/ssl:ro \
              -v /home/ubuntu/nginx-ssl.conf:/etc/nginx/conf.d/default.conf:ro \
              ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_FRONTEND }}:${{ steps.tag.outputs.IMAGE_TAG }}

      - name: Verify QA deployment
        run: |
          sleep 15
          curl -sf http://${{ secrets.QA_EC2_HOST }}/health || echo "Health check will work after DNS propagation"
