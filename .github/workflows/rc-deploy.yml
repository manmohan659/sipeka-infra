name: RC Promotion Deploy

on:
  repository_dispatch:
    types: [deploy-rc]
  workflow_dispatch:
    inputs:
      rc_tag:
        description: 'RC tag (e.g., v1.0.0-rc.1)'
        required: true
      source_tag:
        description: 'Source image tag (git SHA)'
        required: true

env:
  AWS_REGION: us-west-2
  ECR_BACKEND: sipeka-backend
  ECR_FRONTEND: sipeka-frontend

jobs:
  retag-and-deploy:
    name: Retag Images & Deploy RC
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Determine tags
        id: tags
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "RC_TAG=${{ github.event.client_payload.rc_tag }}" >> $GITHUB_OUTPUT
            echo "SOURCE_TAG=${{ github.event.client_payload.source_tag }}" >> $GITHUB_OUTPUT
          else
            echo "RC_TAG=${{ github.event.inputs.rc_tag }}" >> $GITHUB_OUTPUT
            echo "SOURCE_TAG=${{ github.event.inputs.source_tag }}" >> $GITHUB_OUTPUT
          fi

      - name: Retag images with RC label
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          RC_TAG: ${{ steps.tags.outputs.RC_TAG }}
          SRC_TAG: ${{ steps.tags.outputs.SOURCE_TAG }}
        run: |
          # Pull source images
          docker pull $REGISTRY/$ECR_BACKEND:$SRC_TAG
          docker pull $REGISTRY/$ECR_FRONTEND:$SRC_TAG

          # Retag with RC version (not UUID)
          docker tag $REGISTRY/$ECR_BACKEND:$SRC_TAG $REGISTRY/$ECR_BACKEND:$RC_TAG
          docker tag $REGISTRY/$ECR_FRONTEND:$SRC_TAG $REGISTRY/$ECR_FRONTEND:$RC_TAG

          # Push RC-tagged images
          docker push $REGISTRY/$ECR_BACKEND:$RC_TAG
          docker push $REGISTRY/$ECR_FRONTEND:$RC_TAG

          echo "Images retagged: $SRC_TAG -> $RC_TAG"

      - name: Deploy to RC EC2
        uses: appleboy/ssh-action@v1
        env:
          RC_TAG: ${{ steps.tags.outputs.RC_TAG }}
        with:
          host: ${{ secrets.RC_EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: RC_TAG
          script: |
            export AWS_DEFAULT_REGION=${{ env.AWS_REGION }}

            # Login to ECR
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com

            # Stop old containers
            docker stop frontend backend 2>/dev/null || true
            docker rm frontend backend 2>/dev/null || true

            # Pull RC images
            docker pull ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_BACKEND }}:$RC_TAG
            docker pull ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_FRONTEND }}:$RC_TAG

            # Fetch secrets from SSM
            DB_HOST=$(aws ssm get-parameter --name /sipeka/db/host --query 'Parameter.Value' --output text --region ${{ env.AWS_REGION }})
            DB_USER=$(aws ssm get-parameter --name /sipeka/db/user --query 'Parameter.Value' --output text --region ${{ env.AWS_REGION }})
            DB_PASSWORD=$(aws ssm get-parameter --name /sipeka/db/password --with-decryption --query 'Parameter.Value' --output text --region ${{ env.AWS_REGION }})
            SESS_SECRET=$(aws ssm get-parameter --name /sipeka/sess/secret --with-decryption --query 'Parameter.Value' --output text --region ${{ env.AWS_REGION }})

            docker network create sipeka-net 2>/dev/null || true

            docker run -d --name backend --network sipeka-net --restart unless-stopped \
              -e DB_HOST=$DB_HOST -e DB_USER=$DB_USER -e DB_PASSWORD=$DB_PASSWORD \
              -e DB_NAME=db_penggajian3 -e SESS_SECRET=$SESS_SECRET \
              -e APP_PORT=5000 -e NODE_ENV=production -e CORS_ORIGIN=* \
              -p 5000:5000 \
              ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_BACKEND }}:$RC_TAG

            docker run -d --name frontend --network sipeka-net --restart unless-stopped \
              -p 80:80 -p 443:443 \
              -v /etc/letsencrypt:/etc/nginx/ssl:ro \
              -v /home/ubuntu/nginx-ssl.conf:/etc/nginx/conf.d/default.conf:ro \
              ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_FRONTEND }}:$RC_TAG

      - name: Verify RC deployment
        run: |
          sleep 15
          echo "RC deployed with tag ${{ steps.tags.outputs.RC_TAG }}"
          echo "Accessible at: https://sipeka-rc.YOUR_DOMAIN.com"
